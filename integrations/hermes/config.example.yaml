# Merge this block into ~/.hermes/config.yaml.
# Replace /home/USER/ai-sports-clipper with the absolute repository path.

mcp_servers:
  sports_clipper:
    command: "/home/USER/ai-sports-clipper/.venv/bin/clipper-mcp"
    env:
      CLIPPER_PROJECT_ROOT: "/home/USER/ai-sports-clipper"
      CLIPPER_JOBS_ROOT: "/home/USER/ai-sports-clipper/data/jobs"
    tools:
      include:
        - submit_clip_job
        - get_clip_job
        - list_clip_outputs
        - cancel_clip_job
